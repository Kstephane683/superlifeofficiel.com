<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Introuvable | Superlife Officiel Côte d'Ivoire</title>
    
    <meta name="robots" content="noindex, follow">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2A6A3B;
            --gold: #c9a96e;
            --dark: #08080c;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--dark);
            color: var(--white);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }

        .container {
            padding: 20px;
            max-width: 600px;
        }

        .logo {
            height: 70px;
            margin-bottom: 40px;
            filter: brightness(0) invert(1); /* Rend le logo blanc pour le fond noir */
        }

        h1 {
            font-size: 8rem;
            font-weight: 900;
            color: var(--gold);
            line-height: 1;
            margin-bottom: 10px;
            letter-spacing: -5px;
        }

        h2 {
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.1rem;
            opacity: 0.8;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .btn-home {
            display: inline-block;
            padding: 15px 40px;
            background-color: var(--gold);
            color: var(--dark);
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .btn-home:hover {
            transform: scale(1.05);
            background-color: var(--white);
        }

        .bg-decoration {
            position: absolute;
            z-index: -1;
            font-size: 25rem;
            opacity: 0.03;
            color: var(--gold);
            bottom: -100px;
            right: -50px;
        }
    </style>
</head>
<body>

    <div class="bg-decoration">
        <i class="fas fa-leaf"></i>
    </div>

    <div class="container">
        <img src="https://api.eperformance.pro/uploads_clients/logo_3_1774032354.PNG" alt="Superlife Officiel" class="logo">
        
        <h1>404</h1>
        <h2>Lien Obsolète</h2>
        <p>
            L'ancienne page Google Sites que vous cherchez n'existe plus. 
            Nous avons migré vers une plateforme plus rapide pour mieux vous servir en Côte d'Ivoire.
        </p>
        
        <a href="/" class="btn-home">
            <i class="fas fa-home"></i> Retour à l'accueil
        </a>
    </div>

</body>
</html>
