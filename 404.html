<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Page Introuvable | Superlife Officiel CI</title>
    
    <meta name="robots" content="noindex, follow">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #2A6A3B;
            --primary-dark: #1D4D29;
            --dark: #1a1a1a;
            --white: #ffffff;
            --light: #f4f7f6;
            --whatsapp: #25D366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background-color: var(--white);
            color: var(--dark);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        /* Correction Logo : Utilisation du chemin absolu /logo.png */
        .logo-container {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
        }
        
        .logo {
            height: 50px;
            width: auto;
        }

        .content-404 {
            margin-top: -50px;
        }

        h1 {
            font-size: 8rem;
            font-weight: 800;
            color: var(--primary);
            line-height: 1;
            margin-bottom: 10px;
        }

        h2 {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--primary-dark);
            margin-bottom: 20px;
        }

        p {
            font-size: 1rem;
            color: #666;
            max-width: 400px;
            margin: 0 auto 30px;
            line-height: 1.6;
        }

        /* Mobile First Sticky Bar */
        .sticky-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--white);
            padding: 15px;
            display: flex;
            gap: 10px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
            border-radius: 20px 20px 0 0;
        }

        .btn-action {
            flex: 1;
            padding: 16px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.3s;
        }

        .btn-home {
            background-color: var(--primary);
            color: var(--white);
        }

        .btn-wa {
            background-color: var(--whatsapp);
            color: var(--white);
        }

        /* Icône de fond discrète */
        .bg-leaf {
            position: absolute;
            font-size: 20rem;
            color: var(--primary);
            opacity: 0.03;
            bottom: 10%;
            right: -50px;
            transform: rotate(-20deg);
            z-index: -1;
        }
    </style>
</head>
<body>

    <i class="fas fa-leaf bg-leaf"></i>

    <div class="logo-container">
        <a href="/index.html">
            <img src="/logo.png" alt="Superlife Officiel" class="logo">
        </a>
    </div>

    <div class="content-404">
        <h1>404</h1>
        <h2>Lien expiré ou introuvable</h2>
        
        <p>
            Nous avons optimisé notre plateforme. La page que vous cherchez a été déplacée pour mieux vous servir avec nos solutions 100% bio.
        </p>
    </div>

    <div class="sticky-bar">
        <a href="https://wa.me/2250152917584" class="btn-action btn-wa">
            <i class="fab fa-whatsapp"></i> Aide
        </a>
        <a href="/index.html" class="btn-action btn-home">
            <i class="fas fa-home"></i> Accueil
        </a>
    </div>

</body>
</html>
