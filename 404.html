<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Introuvable | Superlife Officiel</title>
    
    <meta name="robots" content="noindex, follow">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gold: #c9a96e;
            --dark: #08080c;
            --white: #ffffff;
            --gray: #a8a8a8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--dark);
            color: var(--white);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }

        .container {
            padding: 30px;
            max-width: 600px;
            z-index: 2;
        }

        .logo {
            height: 85px; /* Optimisé pour ton logo Premium */
            width: auto;
            margin-bottom: 40px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        h1 {
            font-size: 9rem;
            font-weight: 900;
            color: var(--gold);
            line-height: 0.8;
            margin-bottom: 20px;
            letter-spacing: -5px;
            opacity: 0.9;
        }

        h2 {
            font-size: 1.6rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 25px;
            color: var(--white);
        }

        p {
            font-size: 1.1rem;
            color: var(--gray);
            margin-bottom: 45px;
            line-height: 1.6;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .btn-home {
            display: inline-block;
            padding: 16px 45px;
            background-color: var(--gold);
            color: var(--dark);
            text-decoration: none;
            font-weight: 700;
            border-radius: 50px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            font-size: 0.85rem;
            width: 300px;
            letter-spacing: 1px;
        }

        .btn-whatsapp {
            display: inline-block;
            padding: 16px 45px;
            background-color: transparent;
            color: var(--gold);
            text-decoration: none;
            font-weight: 700;
            border: 2px solid var(--gold);
            border-radius: 50px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            font-size: 0.85rem;
            width: 300px;
            letter-spacing: 1px;
        }

        .btn-home:hover {
            transform: translateY(-3px);
            background-color: var(--white);
            box-shadow: 0 10px 20px rgba(201, 169, 110, 0.2);
        }

        .btn-whatsapp:hover {
            transform: translateY(-3px);
            background-color: rgba(201, 169, 110, 0.1);
            box-shadow: 0 10px 20px rgba(201, 169, 110, 0.1);
        }

        /* Décoration d'arrière-plan rappelant la nature/santé */
        .bg-icon {
            position: absolute;
            z-index: 1;
            font-size: 30rem;
            opacity: 0.02;
            color: var(--gold);
            bottom: -150px;
            left: -100px;
            transform: rotate(-15deg);
        }
    </style>
</head>
<body>

    <i class="fas fa-leaf bg-icon"></i>

    <div class="container">
        <a href="/">
            <img src="logo.png" alt="Superlife Officiel Logo" class="logo">
        </a>
        
        <h1>404</h1>
        <h2>Destination introuvable</h2>
        
        <p>
            Nous avons apporté des améliorations à notre site internet pour une expérience plus fluide. Le lien que vous avez suivi a été modifié. 
            Nous avons des produits 100 % bio adaptés à tout type de problème.
        </p>
        
        <div class="btn-group">
            <a href="/" class="btn-home">
                <i class="fas fa-th-large"></i> Voir nos produits
            </a>
            <a href="https://wa.me/2250152917584" class="btn-whatsapp">
                <i class="fab fa-whatsapp"></i> Conseiller WhatsApp
            </a>
        </div>
    </div>

</body>
</html>
