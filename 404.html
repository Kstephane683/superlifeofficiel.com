<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Redirection | Superlife Officiel CI</title>
    <style>
        :root { --primary: #2A6A3B; }
        body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; color: #666; margin: 0; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div>
        <div class="loader"></div>
        <p>Chargement en cours...</p>
    </div>

    <script>
        (function() {
            const path = window.location.pathname.toLowerCase();
            const fullUrl = window.location.href.toLowerCase();

            // --- PROTECTION RADICALE CONTRE LA BOUCLE ---
            // Si on est sur l'accueil, on ne redirige JAMAIS.
            if (path === "/" || path === "/index" || path === "/index.html" || path === "") {
                console.log("Accueil détecté : arrêt du script 404.");
                return; 
            }

            const rules = {
                'stc30': '/superlife-stc30-prix-ci.html',
                'scc': '/superlife-scc-plus-colon.html',
                'sic': '/superlife-sic-immunite.html',
                'snc': '/superlife-snc-cerveau-vision.html',
                'coffee': '/super-root-coffee-puissance.html',
                'perle': '/super-root-coffee-puissance.html',
                'blog': '/conseils-sante-cellulaire-superlife.html',
                'contact': '/contact-superlife-cote-divoire.html'
            };

            let target = null;

            // Vérification des mots-clés
            for (let key in rules) {
                if (fullUrl.indexOf(key) !== -1) {
                    target = rules[key];
                    break;
                }
            }

            // Redirection uniquement si un produit est trouvé
            if (target) {
                window.location.replace(target);
            } else {
                // Si aucune règle ne correspond, on attend 2 secondes et on force l'index
                // mais seulement si on n'y est pas déjà (double sécurité)
                setTimeout(() => {
                    if (window.location.pathname !== "/" && window.location.pathname !== "/index.html") {
                        window.location.href = "/index.html";
                    }
                }, 2000);
            }
        })();
    </script>
</body>
</html>
