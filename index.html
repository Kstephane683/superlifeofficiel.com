<div class="mobile-action-bar">
    <a href="#" onclick="trackWhatsApp(); return false;" class="action-item" style="background:var(--whatsapp); color:white;">
        <i class="fab fa-whatsapp"></i> WhatsApp
    </a>
    <a href="tel:2250152917584" class="action-item" style="background:var(--primary-dark); color:white;">
        <i class="fas fa-phone-alt"></i> Appeler
    </a>
</div>

<script>
    // ... (garder tout le code précédent tel quel jusqu'à sendOrder)

    async function trackWhatsApp() {
        try {
            await fetch(CONFIG.CAPI_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ event: 'Contact' })
            });
        } catch(e) { console.error("Erreur track WhatsApp"); }
        window.location.href = `https://wa.me/${CONFIG.WA.replace('+','')}`;
    }

    async function sendOrder() {
        const name = document.getElementById('m-name').value;
        const phone = document.getElementById('m-phone').value;
        const addr = document.getElementById('m-address').value;
        const totalStr = document.getElementById('m-price').innerText;
        const totalVal = parseInt(totalStr.replace(/\s/g, ''));

        if(!name || !phone || !addr) return alert("Veuillez remplir vos coordonnées.");

        // 1. Envoi à l'API Conversions (LWS) - Signal : Purchase (par défaut)
        try {
            await fetch(CONFIG.CAPI_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    event: 'Purchase', 
                    name: name, 
                    phone: phone, 
                    total: totalVal 
                })
            });
        } catch(e) { console.error("CAPI Error", e); }

        // 2. Préparation Message Telegram
        let list = `• ${PRODUCTS.find(p => p.id === currentMainId).name}: ${document.getElementById('main-qty-select').value}\n`;
        document.querySelectorAll('.upsell-select').forEach(s => {
            if(s.value > 0) list += `• ${PRODUCTS.find(p => p.id === s.id.replace('up-','')).name}: ${s.value}\n`;
        });

        const msg = `📦 *NOUVELLE COMMANDE*\n----------\n${list}\n*TOTAL:* ${totalStr} FCFA (Livraison incluse)\n\n*CLIENT:* ${name}\n*TEL:* ${phone}\n*ADRESSE:* ${addr}`;

        // 3. Envoi Telegram
        try {
            const response = await fetch(`https://api.telegram.org/bot${CONFIG.TG_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chat_id: CONFIG.TG_CHAT_ID, text: msg, parse_mode: 'Markdown' })
            });
            
            if (response.ok) {
                alert("Commande transmise avec succès ! Nous vous recontacterons.");
                closeModal();
            } else { throw new Error(); }
        } catch (e) {
            window.open(`https://wa.me/${CONFIG.WA.replace('+','')}?text=${encodeURIComponent(msg)}`, '_blank');
        }
    }
    init();
</script>
