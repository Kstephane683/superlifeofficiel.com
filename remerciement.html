<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merci pour votre confiance | Superlife Officiel CI</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-VY50YCRQNS"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-VY50YCRQNS');
      
      // Événement de conversion spécifique
      gtag('event', 'purchase', {
        "transaction_id": "SL-" + Math.floor(Math.random() * 100000),
        "affiliation": "Boutique Superlife CI",
        "currency": "XOF"
      });
    </script>

    <style>
        :root { 
            --primary: #2A6A3B; 
            --gold: #c9a96e; 
            --dark: #08080c; 
            --white: #ffffff;
            --light: #f4f7f6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--white); color: var(--dark); text-align: center; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        
        .thank-you-card { 
            max-width: 500px; width: 100%; padding: 40px 25px; 
            border-radius: 30px; background: var(--white);
            box-shadow: 0 10px 40px rgba(0,0,0,0.05); border: 1px solid #eee;
        }
        .icon-check { 
            width: 80px; height: 80px; background: var(--primary); 
            color: white; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; 
            font-size: 2.5rem; margin: 0 auto 25px;
            box-shadow: 0 10px 20px rgba(42, 106, 59, 0.2);
        }
        h1 { color: var(--primary); font-weight: 800; font-size: 1.8rem; margin-bottom: 15px; }
        p { color: #555; margin-bottom: 25px; font-size: 0.95rem; }
        
        .steps { text-align: left; background: var(--light); padding: 20px; border-radius: 20px; margin-bottom: 30px; }
        .step-item { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; font-size: 0.85rem; font-weight: 600; }
        .step-item i { color: var(--gold); }

        .btn-home { 
            display: block; background: var(--primary); color: white; 
            text-decoration: none; padding: 16px; border-radius: 15px; 
            font-weight: 700; transition: 0.3s;
        }
        .whatsapp-contact { display: inline-block; margin-top: 20px; color: #25D366; text-decoration: none; font-weight: 700; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="thank-you-card">
        <div class="icon-check"><i class="fas fa-check"></i></div>
        <h1>Commande Reçue !</h1>
        <p>Merci pour votre confiance. Votre demande est en cours de traitement par notre équipe logistique.</p>
        
        <div class="steps">
            <div class="step-item"><i class="fas fa-phone-alt"></i> Un conseiller va vous appeler pour confirmer.</div>
            <div class="step-item"><i class="fas fa-truck"></i> Livraison Abidjan (24h) / Intérieur (48h).</div>
            <div class="step-item"><i class="fas fa-wallet"></i> Paiement cash à la livraison.</div>
        </div>

        <a href="index.html" class="btn-home">Retour à la boutique</a>
        <a href="https://wa.me/2250152917584" class="whatsapp-contact">
            <i class="fab fa-whatsapp"></i> Une question ? Contactez-nous
        </a>
    </div>

</body>
</html>
