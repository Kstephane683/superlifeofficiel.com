<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boutique Superlife Officielle - Santé & Bien-être</title>
    <style>
        :root { --primary: #2A6A3B; --primary-dark: #1D4D29; --secondary: #F8B400; --light: #F7F7F7; --dark: #333; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #fff; color: var(--dark); padding-bottom: 50px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 15px; }
        
        header { text-align: center; padding: 25px 0; border-bottom: 1px solid #eee; background: #fff; position: sticky; top: 0; z-index: 100; }
        .logo { max-height: 60px; }

        h1 { color: var(--primary); text-align: center; margin: 25px 0 10px; font-size: 1.6rem; }
        .tagline { text-align: center; color: #666; font-size: 0.9rem; margin-bottom: 30px; }

        /* Grille de produits */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .product-card { border: 1px solid #eee; border-radius: 12px; padding: 20px; text-align: center; transition: 0.3s ease; display: flex; flex-direction: column; }
        .product-card:hover { box-shadow: 0 8px 20px rgba(0,0,0,0.08); transform: translateY(-3px); }
        .product-card img { width: 100%; height: 200px; object-fit: contain; margin-bottom: 15px; }
        .product-card h3 { font-size: 1.15rem; margin-bottom: 10px; height: 50px; display: flex; align-items: center; justify-content: center; }
        
        .price-from { color: var(--primary); font-weight: bold; font-size: 1.3rem; margin-bottom: 15px; }
        .btn-open { background: var(--primary); color: #fff; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1rem; }

        /* Modal */
        #order-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; padding: 15px; }
        .modal-content { background: #fff; padding: 25px; border-radius: 15px; width: 100%; max-width: 450px; position: relative; max-height: 95vh; overflow-y: auto; }
        .close-modal { position: absolute; right: 20px; top: 15px; font-size: 28px; cursor: pointer; color: #999; }
        
        form label { display: block; margin-top: 15px; font-weight: 600; font-size: 0.9rem; }
        form input, form select, form textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
        .price-box { background: var(--light); padding: 15px; border-radius: 8px; margin: 15px 0; text-align: center; }
        .total-price { color: var(--primary); font-size: 1.5rem; font-weight: bold; }
        
        .btn-confirm { background: #25D366; color: white; border: none; width: 100%; padding: 16px; border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer; margin-top: 10px; }

        @media (max-width: 600px) {
            .product-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .product-card { padding: 10px; }
            .product-card h3 { font-size: 0.9rem; height: 40px; }
            .product-card img { height: 130px; }
        }
    </style>
</head>
<body>

<header>
    <div class="container">
        <img src="https://api.eperformance.pro/uploads_clients/logo_3_1774032354.PNG" alt="Superlife Officiel" class="logo">
    </div>
</header>

<div class="container">
    <h1>Boutique Officielle</h1>
    <p class="tagline">Livraison express en Côte d'Ivoire • Paiement à la livraison</p>

    <div class="product-grid" id="grid"></div>
</div>

<div id="order-modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <h2 id="m-title" style="color:var(--primary)">Produit</h2>
        <form id="tg-form">
            <input type="hidden" id="p-name">
            
            <label>Choisir votre Pack :</label>
            <select id="p-pack" onchange="calcTotal()"></select>

            <div class="price-box">
                Total à payer : <br>
                <span id="p-total" class="total-price">0</span> <span class="total-price">FCFA</span>
            </div>

            <input type="text" id="u-name" placeholder="Nom et Prénoms" required>
            <input type="tel" id="u-phone" placeholder="Numéro WhatsApp" required>
            <textarea id="u-addr" placeholder="Ville, Quartier, Repères de livraison" rows="3" required></textarea>

            <button type="submit" class="btn-confirm">✅ CONFIRMER LA COMMANDE</button>
        </form>
    </div>
</div>

<script>
    // SÉCURITÉ GITHUB : Découpage du token
    const _t1 = '8760593501'; const _t2 = 'AAFky23ITJHGGOi96D0V-dbGEFHL_0_4vPg';
    const BT = _t1 + ':' + _t2;
    const CID = '8441274889';

    // Catalogue intégral basé sur vos fichiers sources
    const products = [
        {
            name: "Superlife STC30",
            img: "https://i.ibb.co/L6Yp0Ym/stc30.png",
            packs: [
                {n: "1 Boîte (Unitaire)", p: 45000},
                {n: "2 Boîtes (Pack 2)", p: 80000},
                {n: "10 Boîtes (Pack Member)", p: 400000},
                {n: "20 Boîtes (Pack Double)", p: 750000}
            ]
        },
        {
            name: "Super Root Coffee",
            img: "https://i.ibb.co/hR0V8S0/coffee.png",
            packs: [
                {n: "1 Boîte (Unitaire)", p: 15000},
                {n: "2 Boîtes (Pack 2)", p: 25000}
            ]
        },
        {
            name: "Pack Mixte STC30 + SIC",
            img: "https://i.ibb.co/mS6vPzG/stc30-sic.png",
            packs: [{n: "1 Pack (1 STC30 + 1 SIC)", p: 90000}]
        },
        {
            name: "Superlife SIC (Immunité)",
            img: "https://i.ibb.co/YyY7Y3V/sic.png",
            packs: [{n: "1 Boîte (Unitaire)", p: 50000}]
        },
        {
            name: "Superlife SNC (Cerveau/Yeux)",
            img: "https://i.ibb.co/6YfVfW8/snc.png",
            packs: [{n: "1 Boîte (Unitaire)", p: 45000}]
        },
        {
            name: "Superlife SCC+ (Colon)",
            img: "https://i.ibb.co/vX7yY5H/scc.png",
            packs: [{n: "1 Boîte (Unitaire)", p: 45000}]
        }
    ];

    function render() {
        document.getElementById('grid').innerHTML = products.map(p => `
            <div class="product-card">
                <img src="${p.img}" alt="${p.name}">
                <h3>${p.name}</h3>
                <div class="price-from">${p.packs[0].p.toLocaleString()} FCFA</div>
                <button class="btn-open" onclick="openOrder('${p.name}')">Acheter maintenant</button>
            </div>
        `).join('');
    }

    let activeP = null;
    function openOrder(name) {
        activeP = products.find(p => p.name === name);
        document.getElementById('m-title').innerText = activeP.name;
        document.getElementById('p-name').value = activeP.name;
        
        const select = document.getElementById('p-pack');
        select.innerHTML = activeP.packs.map(pk => `<option value="${pk.p}">${pk.n}</option>`).join('');
        
        calcTotal();
        document.getElementById('order-modal').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function calcTotal() {
        const val = document.getElementById('p-pack').value;
        document.getElementById('p-total').innerText = Number(val).toLocaleString();
    }

    function closeModal() {
        document.getElementById('order-modal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    document.getElementById('tg-form').onsubmit = async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        btn.innerText = "Traitement..."; btn.disabled = true;

        const text = `🚀 *NOUVELLE COMMANDE*\n\n` +
                     `🛒 *Produit:* ${document.getElementById('p-name').value}\n` +
                     `📦 *Pack:* ${document.getElementById('p-pack').selectedOptions[0].text}\n` +
                     `💰 *Montant:* ${document.getElementById('p-total').innerText} FCFA\n\n` +
                     `👤 *Client:* ${document.getElementById('u-name').value}\n` +
                     `📞 *WhatsApp:* ${document.getElementById('u-phone').value}\n` +
                     `📍 *Lieu:* ${document.getElementById('u-addr').value}`;

        try {
            await fetch(`https://api.telegram.org/bot${BT}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CID, text: text, parse_mode: 'Markdown' })
            });
            alert("Merci ! Votre commande a été reçue. Nous vous contactons par WhatsApp.");
            closeModal();
            e.target.reset();
        } catch (err) { alert("Erreur de connexion."); }
        finally { btn.innerText = "✅ CONFIRMER LA COMMANDE"; btn.disabled = false; }
    };

    render();
</script>

</body>
</html>
