<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boutique Superlife Côte d'Ivoire | Prix STC30, SNC, SCC+ officiels</title>
    <meta name="description" content="Commandez vos produits Superlife originaux en Côte d'Ivoire. STC30, SNC, SCC+, SIC et Super Root Coffee. Livraison rapide et paiement à la livraison.">
    <style>
        :root { --primary: #2A6A3B; --secondary: #F8B400; --dark: #333; --light: #f9f9f9; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: #fff; color: var(--dark); }
        .container { max-width: 1100px; margin: 0 auto; padding: 15px; }
        header { text-align: center; padding: 20px 0; border-bottom: 1px solid #eee; }
        .logo { max-height: 60px; }
        
        h1 { color: var(--primary); font-size: 1.5rem; text-align: center; }
        
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; margin-top: 20px; }
        .product-card { border: 1px solid #eee; border-radius: 10px; padding: 10px; text-align: center; display: flex; flex-direction: column; justify-content: space-between; }
        .product-card img { width: 100%; height: 140px; object-fit: contain; }
        .product-card h3 { font-size: 1rem; margin: 10px 0 5px; }
        .price-tag { color: var(--primary); font-weight: bold; font-size: 1.1rem; margin-bottom: 10px; }
        
        .btn-view { background: var(--primary); color: #fff; text-decoration: none; padding: 8px; border-radius: 5px; font-size: 0.9rem; }
        
        /* Notification de commande simple */
        #order-form-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal { background: #fff; padding: 20px; border-radius: 10px; width: 90%; max-width: 400px; }
        input, textarea, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .btn-send { background: #25D366; color: white; border: none; width: 100%; padding: 12px; font-weight: bold; cursor: pointer; }
        .close-modal { float: right; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <img src="https://api.eperformance.pro/uploads_clients/logo_3_1774032354.PNG" alt="Superlife Officiel" class="logo">
</header>

<div class="container">
    <h1>Boutique Officielle Superlife</h1>
    <p style="text-align:center; font-size: 0.9rem; color: #666;">Distributeur Agréé - Livraison 24h/48h en Côte d'Ivoire</p>

    <div class="product-grid" id="main-grid">
        </div>
</div>

<div id="order-form-container">
    <div class="modal">
        <span class="close-modal" onclick="closeModal()">X</span>
        <h2 id="modal-title" style="font-size: 1.2rem; color: var(--primary);">Commander</h2>
        <form id="tg-form">
            <input type="hidden" id="prod-name">
            <select id="prod-pack" onchange="updatePrice()"></select>
            <p style="font-weight:bold">Total : <span id="display-price">0</span> FCFA</p>
            <input type="text" id="cust-name" placeholder="Votre Nom complet" required>
            <input type="tel" id="cust-phone" placeholder="Votre numéro de téléphone" required>
            <textarea id="cust-addr" placeholder="Lieu de livraison (Ville, quartier...)" required></textarea>
            <button type="submit" class="btn-send">✅ CONFIRMER LA COMMANDE</button>
        </form>
    </div>
</div>

<script>
    const BOT_TOKEN = '8760593501:AAFky23ITJHGGOi96D0V-dbGEFHL_0_4vPg';
    const CHAT_ID = '8441274889';

    const products = [
        { id: 'stc30', name: 'Superlife STC30', img: 'https://api.eperformance.pro/uploads_clients/stc30.png', 
          packs: [{n:'Unitaire', p:45000}, {n:'Pack 2', p:80000}, {n:'Pack 4', p:150000}] },
        { id: 'coffee', name: 'Super Root Coffee', img: 'https://api.eperformance.pro/uploads_clients/coffee.png', 
          packs: [{n:'Unitaire', p:15000}, {n:'Pack 2', p:25000}] },
        { id: 'snc', name: 'Superlife SNC', img: 'https://api.eperformance.pro/uploads_clients/snc.png', 
          packs: [{n:'Unitaire', p:45000}] },
        { id: 'scc', name: 'Superlife SCC+', img: 'https://api.eperformance.pro/uploads_clients/scc.png', 
          packs: [{n:'Unitaire', p:45000}] }
    ];

    function initBoutique() {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = products.map(p => `
            <div class="product-card">
                <img src="${p.img}" alt="${p.name}">
                <h3>${p.name}</h3>
                <p class="price-tag">${p.packs[0].p.toLocaleString()} FCFA</p>
                <button onclick="openOrder('${p.id}')" class="btn-view">Commander</button>
            </div>
        `).join('');
    }

    let currentProd = null;

    function openOrder(id) {
        currentProd = products.find(p => p.id === id);
        document.getElementById('modal-title').innerText = currentProd.name;
        document.getElementById('prod-name').value = currentProd.name;
        
        const select = document.getElementById('prod-pack');
        select.innerHTML = currentProd.packs.map(pack => `<option value="${pack.p}">${pack.n} - ${pack.p} FCFA</option>`).join('');
        
        updatePrice();
        document.getElementById('order-form-container').style.display = 'flex';
    }

    function updatePrice() {
        const p = document.getElementById('prod-pack').value;
        document.getElementById('display-price').innerText = Number(p).toLocaleString();
    }

    function closeModal() { document.getElementById('order-form-container').style.display = 'none'; }

    document.getElementById('tg-form').onsubmit = async (e) => {
        e.preventDefault();
        const text = `📦 *NOUVELLE COMMANDE*\n\n` +
                     `🛒 *Produit:* ${document.getElementById('prod-name').value}\n` +
                     `🎁 *Pack:* ${document.getElementById('prod-pack').selectedOptions[0].text}\n` +
                     `👤 *Client:* ${document.getElementById('cust-name').value}\n` +
                     `📞 *Tel:* ${document.getElementById('cust-phone').value}\n` +
                     `📍 *Adresse:* ${document.getElementById('cust-addr').value}`;

        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(text)}&parse_mode=Markdown`;
        
        try {
            await fetch(url);
            alert("Commande envoyée avec succès ! Nous vous contacterons sous peu.");
            closeModal();
        } catch (err) { alert("Erreur lors de l'envoi. Veuillez réessayer."); }
    };

    initBoutique();
</script>
</body>
</html>
