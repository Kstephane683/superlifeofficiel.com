<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boutique Officielle Superlife | Prix STC30 & Packs Promo</title>
    <style>
        :root { --primary: #2A6A3B; --secondary: #F8B400; --dark: #333; --light: #f4f4f4; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #fff; color: var(--dark); line-height: 1.6; }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 20px; border-bottom: 1px solid #eee; }
        .logo { max-height: 60px; }
        
        h1 { color: var(--primary); text-align: center; margin: 20px 0; font-size: 1.6rem; }
        
        /* Grille produits */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .product-card { border: 1px solid #eee; border-radius: 12px; padding: 15px; text-align: center; display: flex; flex-direction: column; transition: 0.3s; }
        .product-card:hover { box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .product-card img { width: 100%; height: 180px; object-fit: contain; margin-bottom: 15px; background: #f9f9f9; border-radius: 8px; }
        
        .price-display { font-size: 1.3rem; color: var(--primary); font-weight: bold; margin: 10px 0; }
        .btn-buy { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 25px; cursor: pointer; font-weight: bold; width: 100%; }

        /* Modal */
        #order-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 10px; width: 90%; max-width: 450px; position: relative; }
        .close { position: absolute; right: 15px; top: 10px; font-size: 24px; cursor: pointer; }
        
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        .btn-confirm { background: #25D366; color: white; border: none; width: 100%; padding: 15px; font-weight: bold; border-radius: 5px; cursor: pointer; }

        @media (max-width: 600px) { .product-grid { grid-template-columns: 1fr 1fr; gap: 10px; } .product-card { padding: 10px; } h1 { font-size: 1.2rem; } }
    </style>
</head>
<body>

<header>
    <img src="https://api.eperformance.pro/uploads_clients/logo_3_1774032354.PNG" alt="Superlife Logo" class="logo">
</header>

<div class="container">
    <h1>Boutique Superlife Côte d'Ivoire</h1>
    <div class="product-grid" id="product-list"></div>
</div>

<div id="order-modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2 id="m-name" style="color:var(--primary)">Produit</h2>
        <form id="order-form">
            <input type="hidden" id="p-title">
            <label>Choisir votre pack :</label>
            <select id="p-pack" onchange="updatePrice()"></select>
            <p style="text-align:center; font-weight:bold; font-size:1.2rem;">Total : <span id="p-total">0</span> FCFA</p>
            
            <input type="text" id="c-name" placeholder="Nom complet" required>
            <input type="tel" id="c-phone" placeholder="Numéro Téléphone / WhatsApp" required>
            <textarea id="c-addr" placeholder="Adresse de livraison exacte" required></textarea>
            
            <button type="submit" class="btn-confirm">VALIDER LA COMMANDE</button>
        </form>
    </div>
</div>

<script>
    // Sécurité Token
    const p1 = '8760593501'; const p2 = 'AAFky23ITJHGGOi96D0V-dbGEFHL_0_4vPg';
    const T_K = p1 + ':' + p2; const C_ID = '8441274889';

    // Catalogue complet extrait de votre code source
    const products = [
        { 
            name: 'Superlife STC30', 
            img: 'https://i.ibb.co/L6Yp0Ym/stc30.png',
            packs: [
                {n: '1 Boîte (Unitaire)', p: 45000},
                {n: '2 Boîtes (Pack 2)', p: 80000},
                {n: '10 Boîtes (Pack Member)', p: 400000},
                {n: '20 Boîtes (Pack Double)', p: 750000}
            ]
        },
        { 
            name: 'Super Root Coffee', 
            img: 'https://i.ibb.co/hR0V8S0/coffee.png',
            packs: [{n: '1 Boîte', p: 15000}, {n: '2 Boîtes', p: 25000}] 
        },
        { 
            name: 'Pack STC30 + SIC', 
            img: 'https://i.ibb.co/mS6vPzG/stc30-sic.png', 
            packs: [{n: '1 Pack Mixte', p: 90000}] 
        },
        { 
            name: 'Superlife SIC', 
            img: 'https://i.ibb.co/YyY7Y3V/sic.png',
            packs: [{n: '1 Boîte', p: 50000}] 
        },
        { 
            name: 'Superlife SNC', 
            img: 'https://i.ibb.co/6YfVfW8/snc.png',
            packs: [{n: '1 Boîte', p: 45000}] 
        },
        { 
            name: 'Superlife SCC+', 
            img: 'https://i.ibb.co/vX7yY5H/scc.png',
            packs: [{n: '1 Boîte', p: 45000}] 
        }
    ];

    function loadProducts() {
        const grid = document.getElementById('product-list');
        grid.innerHTML = products.map(p => `
            <div class="product-card">
                <img src="${p.img}" alt="${p.name}">
                <h3>${p.name}</h3>
                <p class="price-display">${p.packs[0].p.toLocaleString()} FCFA</p>
                <button class="btn-buy" onclick="openModal('${p.name}')">COMMANDER</button>
            </div>
        `).join('');
    }

    let currentP = null;

    function openModal(name) {
        currentP = products.find(p => p.name === name);
        document.getElementById('m-name').innerText = currentP.name;
        document.getElementById('p-title').value = currentP.name;
        
        const select = document.getElementById('p-pack');
        select.innerHTML = currentP.packs.map(pk => `<option value="${pk.p}">${pk.n}</option>`).join('');
        
        updatePrice();
        document.getElementById('order-modal').style.display = 'flex';
    }

    function updatePrice() {
        const val = document.getElementById('p-pack').value;
        document.getElementById('p-total').innerText = Number(val).toLocaleString();
    }

    function closeModal() { document.getElementById('order-modal').style.display = 'none'; }

    document.getElementById('order-form').onsubmit = async (e) => {
        e.preventDefault();
        const msg = `📦 *COMMANDE REÇUE*\n\n` +
                    `⭐ *Produit:* ${document.getElementById('p-title').value}\n` +
                    `🎁 *Option:* ${document.getElementById('p-pack').selectedOptions[0].text}\n` +
                    `💰 *Prix:* ${document.getElementById('p-total').innerText} FCFA\n\n` +
                    `👤 *Client:* ${document.getElementById('c-name').value}\n` +
                    `📞 *Tel:* ${document.getElementById('c-phone').value}\n` +
                    `📍 *Adresse:* ${document.getElementById('c-addr').value}`;

        try {
            await fetch(`https://api.telegram.org/bot${T_K}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({chat_id: C_ID, text: msg, parse_mode: 'Markdown'})
            });
            alert("Commande validée !");
            closeModal();
        } catch (e) { alert("Erreur d'envoi."); }
    };

    loadProducts();
</script>
</body>
</html>
